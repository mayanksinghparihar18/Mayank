<!DOCTYPE html>
<html>
<head>
  <title>Rajarajeshwari Mart</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f5f5f5; }
    header { background: #2d89ef; color: white; padding: 15px; text-align: center; }
    .container { display: flex; gap: 20px; padding: 20px; flex-wrap: wrap; }
    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      width: 30%;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .card img { width: 100%; border-radius: 10px; }
    .price { color: green; font-weight: bold; }
  </style>
</head>

<body>

<header>
  <h1>Rajarajeshwari Mart 🛒</h1>
</header>

<div class="container">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1542838132-92c53300491e">
    <h3>Fresh Vegetables</h3>
    <p class="price">₹30/kg</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1583258292688-d0213dc5a3a8">
    <h3>Fresh Fruits</h3>
    <p class="price">₹50/kg</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1578916171728-46686eac8d58">
    <h3>Rice & Grains</h3>
    <p class="price">₹45/kg</p>
  </div>

</div>

</body>
</html>
